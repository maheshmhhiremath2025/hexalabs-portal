# Self-hosted Apache Guacamole for browser-based VM access (RDP + SSH)
# Start: docker compose -f dockerfiles/guacamole/docker-compose.yml up -d

version: '3.8'

services:
  guacd:
    image: guacamole/guacd:latest
    container_name: guacd
    restart: unless-stopped
    networks:
      - guac-net

  guacamole:
    image: guacamole/guacamole:latest
    container_name: guacamole
    restart: unless-stopped
    depends_on:
      - guacd
      - guac-db
    environment:
      GUACD_HOSTNAME: guacd
      MYSQL_HOSTNAME: guac-db
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole_user
      MYSQL_PASSWORD: guacamole_pass
      # Enable TOTP for optional 2FA
      TOTP_ENABLED: "false"
      # API token auth for programmatic connection creation
      HEADER_ENABLED: "true"
    ports:
      - "8085:8080"
    networks:
      - guac-net

  guac-db:
    image: mysql:8.0
    container_name: guac-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole_user
      MYSQL_PASSWORD: guacamole_pass
    volumes:
      - guac-db-data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d
    networks:
      - guac-net

volumes:
  guac-db-data:

networks:
  guac-net:
    driver: bridge
